<!DOCTYPE html>
<html>
<head>
    <title>Subscription System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Subscription Management</h1>

    <div class="form-box">
        <input type="text" id="name" placeholder="Enter your name">
        
        <select id="plan">
            <option>Basic</option>
            <option>Premium</option>
            <option>Pro</option>
        </select>

        <button onclick="subscribe()">Subscribe</button>
    </div>

    <h3>Active Subscriptions</h3>
    <ul id="userList"></ul>
</div>

<script>
let users = [
    { id: 1, name: "Sindhu", plan: "Premium", status: "Active" },
    { id: 2, name: "John", plan: "Basic", status: "Active" }
];

function loadUsers() {
    let list = document.getElementById("userList");
    list.innerHTML = "";

    users.forEach(user => {
        list.innerHTML += `
            <li>
                <div>
                    <strong>${user.name}</strong><br>
                    Plan: ${user.plan} | Status: ${user.status}
                </div>
                <button class="cancel-btn" onclick="cancel(${user.id})">Cancel</button>
            </li>
        `;
    });
}

function subscribe() {
    const name = document.getElementById("name").value;
    const plan = document.getElementById("plan").value;

    if(name === "") {
        alert("Please enter name");
        return;
    }

    users.push({
        id: users.length + 1,
        name,
        plan,
        status: "Active"
    });

    document.getElementById("name").value = "";
    loadUsers();
}

function cancel(id) {
    users = users.map(user =>
        user.id === id ? { ...user, status: "Canceled" } : user
    );

    loadUsers();
}

loadUsers();
</script>

</body>
</html>
